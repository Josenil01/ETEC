<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Dados I</title>
    <style>
        :root {
            --bg: #09111f;
            --bg-soft: #111c31;
            --card: rgba(12, 19, 35, 0.82);
            --text: #edf3ff;
            --muted: #9fb0cc;
            --border: rgba(159, 176, 204, 0.18);
            --accent-1: #ff8a5b;
            --accent-2: #5bc0ff;
            --accent-3: #8ce99a;
            --accent-4: #ffd166;
            --accent-5: #c792ea;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Consolas, "Courier New", monospace;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(91, 192, 255, 0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255, 138, 91, 0.14), transparent 26%),
                linear-gradient(180deg, #060b16 0%, #09111f 55%, #0d1426 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            opacity: 0.35;
        }

        main {
            position: relative;
            z-index: 1;
            width: min(1400px, calc(100% - 32px));
            margin: 0 auto;
            padding: 56px 0 72px;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-tag {
            display: inline-block;
            padding: 8px 14px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            background: rgba(17, 28, 49, 0.55);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.05;
            margin-bottom: 14px;
        }

        .headline-accent {
            color: var(--accent-1);
            text-shadow: 0 0 24px rgba(255, 138, 91, 0.35);
        }

        .subtitle {
            max-width: 760px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
            font-family: Arial, sans-serif;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .aula-card {
            --tone: var(--accent-1);
            position: relative;
            min-height: 190px;
            border-radius: 22px;
            padding: 22px 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            text-align: center;
            color: var(--text);
            background: linear-gradient(180deg, rgba(17, 28, 49, 0.9), rgba(8, 14, 26, 0.95));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .aula-card::before {
            content: attr(data-label);
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--tone);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
        }

        .aula-card::after {
            content: "";
            position: absolute;
            inset: auto -22% -32% auto;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: radial-gradient(circle, color-mix(in srgb, var(--tone) 28%, transparent), transparent 70%);
            pointer-events: none;
        }

        .aula-card:hover {
            transform: translateY(-8px);
            border-color: var(--tone);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        .aula-card:nth-child(5n + 1) {
            --tone: var(--accent-1);
        }

        .aula-card:nth-child(5n + 2) {
            --tone: var(--accent-2);
        }

        .aula-card:nth-child(5n + 3) {
            --tone: var(--accent-3);
        }

        .aula-card:nth-child(5n + 4) {
            --tone: var(--accent-4);
        }

        .aula-card:nth-child(5n + 5) {
            --tone: var(--accent-5);
        }

        .aula-card.locked {
            opacity: 0.58;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.2);
        }

        .aula-card.locked::before {
            content: "Bloqueada";
            color: #d8dee9;
        }

        .aula-card.locked .aula-status {
            color: #d8dee9;
        }

        .aula-icon {
            font-size: 2.3rem;
            margin-bottom: 12px;
            line-height: 1;
        }

        .aula-number {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .aula-status {
            color: var(--tone);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            color: var(--muted);
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            main {
                width: min(100% - 20px, 1400px);
                padding-top: 32px;
                padding-bottom: 44px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <main>
        <header class="hero">
            <div class="hero-tag">Area do aluno</div>
            <h1>Trilha de <span class="headline-accent">Banco de Dados I</span></h1>
            <p class="subtitle">Acesse as 30 aulas do componente curricular em um layout alinhado com a pagina principal do curso.</p>
        </header>

        <div class="grid" id="gridContainer"></div>

        <p class="footer-note">Por enquanto, apenas a Aula 1 esta disponivel para acesso.</p>
    </main>

    <script>
        const grid = document.getElementById('gridContainer');
        const card = document.createElement('a');

        card.className = 'aula-card';
        card.href = 'aula-01.html';
        card.dataset.label = 'Disponivel';
        card.innerHTML = `
            <div class="aula-icon">📚</div>
            <div class="aula-number">Aula 1</div>
            <div class="aula-status">Abrir conteudo</div>
        `;

        grid.appendChild(card);
    </script>
</body>
</html>

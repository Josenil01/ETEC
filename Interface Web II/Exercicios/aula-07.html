<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 07: Laços de Repetição no DOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .preview-card {
            border: 1px solid rgb(203 213 225);
            background-color: rgb(226 232 240);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: inset 0 2px 4px 0 rgb(15 23 42 / 0.06);
        }

        .preview-title {
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgb(100 116 139);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased">
    <div style="margin:16px 0;">
        <a href="../index.html" style="display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:10px;border:1px solid rgba(159,176,204,.35);background:rgba(17,28,49,.55);color:#9fb0cc;text-decoration:none;letter-spacing:.04em;">Voltar ao menu</a>
    </div>




    <main class="mx-auto max-w-4xl space-y-10 px-6 py-12">
        <section class="space-y-6">
            <div class="space-y-6">
                <div class="preview-card">
                    <h3 class="preview-title">1. forEach (Pokedex)</h3>
                    <div id="live-pokedex-preview" class="grid grid-cols-1 gap-4 sm:grid-cols-3"></div>
                </div>
            </div>

    <div class="preview-card">
        <h3 class="preview-title">2. for (Cinto de Pokebolas)</h3>
        <div id="live-cinto-preview" class="flex flex-wrap justify-center gap-4"></div>
    </div>

    <div class="preview-card">
        <h3 class="preview-title">3. while (Arena de Batalha)</h3>
        <div class="flex flex-col items-center gap-4">
            <div id="live-arena-preview"
                class="flex min-h-[100px] w-full items-center justify-center gap-4 rounded-xl border-2 border-dashed border-green-800 bg-green-900/20 p-4">
                <span class="text-4xl animate-bounce">🦇</span>
                <span class="text-4xl animate-bounce" style="animation-delay: 0.1s">🦇</span>
                <span class="text-4xl animate-bounce" style="animation-delay: 0.2s">🦇</span>
            </div>
            <button id="btn-fugir"
                class="rounded-full bg-rose-500 px-6 py-2 font-bold text-white shadow-md transition-colors hover:bg-rose-600">Usar
                Repelente (Limpar com while)</button>
        </div>
    </div>
    </div>
    </section>
    </main>
</body>

</html>

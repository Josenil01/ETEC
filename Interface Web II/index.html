<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Web II</title>
    <style>
        :root {
            --bg: #09111f;
            --text: #edf3ff;
            --muted: #9fb0cc;
            --border: rgba(159, 176, 204, 0.18);
            --tone: #c792ea;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Consolas, "Courier New", monospace;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(199, 146, 234, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(91, 192, 255, 0.12), transparent 26%),
                linear-gradient(180deg, #060b16 0%, #09111f 55%, #0d1426 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            opacity: 0.35;
        }

        main {
            position: relative;
            z-index: 1;
            width: min(1400px, calc(100% - 32px));
            margin: 0 auto;
            padding: 56px 0 72px;
        }

        .top-actions {
            margin-bottom: 18px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(17, 28, 49, 0.55);
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-tag {
            display: inline-block;
            padding: 8px 14px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            background: rgba(17, 28, 49, 0.55);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.05;
            margin-bottom: 14px;
        }

        .headline-accent {
            color: var(--tone);
            text-shadow: 0 0 24px rgba(199, 146, 234, 0.35);
        }

        .subtitle,
        .aula-summary,
        .footer-note {
            color: var(--muted);
            font-family: Arial, sans-serif;
            line-height: 1.7;
        }

        .subtitle {
            max-width: 780px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .aula-card {
            position: relative;
            min-height: 260px;
            border-radius: 22px;
            padding: 22px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-decoration: none;
            color: var(--text);
            background: linear-gradient(180deg, rgba(17, 28, 49, 0.9), rgba(8, 14, 26, 0.95));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .aula-card::before {
            content: attr(data-label);
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--tone);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
        }

        .aula-card::after {
            content: "";
            position: absolute;
            inset: auto -22% -32% auto;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(199, 146, 234, 0.22), transparent 70%);
            pointer-events: none;
        }

        .aula-card:hover {
            transform: translateY(-8px);
            border-color: var(--tone);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        .aula-chip {
            align-self: flex-start;
            margin-top: 24px;
            margin-bottom: 16px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--tone);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .aula-icon {
            font-size: 2rem;
            margin-bottom: 14px;
        }

        .aula-number {
            font-size: 1.12rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .aula-summary {
            font-size: 0.95rem;
        }

        .aula-status {
            margin-top: auto;
            padding-top: 18px;
            color: var(--tone);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            main {
                width: min(100% - 20px, 1400px);
                padding-top: 32px;
                padding-bottom: 44px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="top-actions">
            <a class="btn-back" href="../index.html">← Voltar ao menu</a>
        </div>

        <header class="hero">
            <div class="hero-tag">Area do aluno</div>
            <h1>Studio de <span class="headline-accent">Interface Web II</span></h1>
            <p class="subtitle">Esta pagina segue o card roxo da tela inicial e organiza as praticas da disciplina com uma apresentacao mais ligada a prototipacao e desenvolvimento front-end.</p>
        </header>

        <div class="grid" id="gridContainer"></div>

        <p class="footer-note">Os cards abaixo abrem as aulas ja disponiveis neste componente curricular.</p>
    </main>

    <script>
        const aulas = [
            { arquivo: 'aula-01.html', titulo: 'Aula 01', tema: 'Setup', icone: '</>', resumo: 'Preparacao do ambiente e primeiros comandos de logica com JavaScript.' },
            { arquivo: 'aula-02.html', titulo: 'Aula 02', tema: 'Dados', icone: '[]', resumo: 'Uso de variaveis, constantes e tipos de dados para modelar informacoes.' },
            { arquivo: 'aula-03.html', titulo: 'Aula 03', tema: 'Operadores', icone: 'OPS', resumo: 'Aplicacao de operadores matematicos, comparacao e expressoes no JavaScript.' },
            { arquivo: 'aula-04.html', titulo: 'Aula 04', tema: 'Funcoes', icone: 'FN', resumo: 'Criacao de funcoes reutilizaveis e entendimento de escopo de variaveis.' },
            { arquivo: 'aula-05.html', titulo: 'Aula 05', tema: 'Estruturas', icone: 'OBJ', resumo: 'Organizacao de colecoes e entidades com arrays e objetos.' },
            { arquivo: 'aula-06.html', titulo: 'Aula 06', tema: 'Condicoes', icone: 'IF', resumo: 'Tomada de decisao no codigo com if, else if e else.' },
            { arquivo: 'aula-07.html', titulo: 'Aula 07', tema: 'Lacos', icone: 'LOOP', resumo: 'Repeticao com for, while e forEach aplicada a renderizacao de itens no DOM.' },
            { arquivo: 'aula-08.html', titulo: 'Aula 08', tema: 'DOM Base', icone: 'DOM', resumo: 'Selecao e manipulacao de elementos HTML usando a arvore DOM.' },
            { arquivo: 'aula-09.html', titulo: 'Aula 09', tema: 'DOM Dinamico', icone: 'NEW', resumo: 'Criacao e alteracao dinamica de elementos e conteudo com JavaScript.' },
            { arquivo: 'aula-10.html', titulo: 'Aula 10', tema: 'Eventos', icone: 'EV', resumo: 'Captura de cliques, teclado e mouse para disparar comportamentos na pagina.' },
            { arquivo: 'aula-11.html', titulo: 'Aula 11', tema: 'Formularios', icone: 'FORM', resumo: 'Intercepcao de submit e validacao de campos antes do envio de dados.' },
            { arquivo: 'aula-12.html', titulo: 'Aula 12', tema: 'APIs', icone: 'API', resumo: 'Assincronia com fetch para consumir dados externos sem travar a interface.' },
            { arquivo: 'aula-13.html', titulo: 'Aula 13', tema: 'HTTP', icone: 'WEB', resumo: 'Fundamentos de cliente-servidor, metodos HTTP e uso de query string.' },
            { arquivo: 'aula-14.html', titulo: 'Aula 14', tema: 'Servidor', icone: 'SRV', resumo: 'Introducao a scripts no lado do servidor e arquitetura em camadas.' },
            { arquivo: 'aula-15.html', titulo: 'Aula 15', tema: 'POST', icone: 'SEND', resumo: 'Envio de dados de formulario para o back-end usando requisicoes HTTP POST.' },
            { arquivo: 'aula-16.html', titulo: 'Aula 16', tema: 'Seguranca', icone: 'SAFE', resumo: 'Validacao no servidor, tratamento de erros e leitura de status HTTP.' },
            { arquivo: 'aula-17.html', titulo: 'Aula 17', tema: 'Estado', icone: 'SAVE', resumo: 'Persistencia de informacoes no navegador com cookies e localStorage.' },
            { arquivo: 'aula-18.html', titulo: 'Aula 18', tema: 'Sessoes', icone: 'AUTH', resumo: 'Controle de sessao e renderizacao de interface por nivel de acesso.' },
            { arquivo: 'aula-19.html', titulo: 'Aula 19', tema: 'Banco Nuvem', icone: 'DB', resumo: 'Conceitos de banco em nuvem e conexao Node.js com PostgreSQL no Neon.' },
            { arquivo: 'aula-20.html', titulo: 'Aula 20', tema: 'CRUD C', icone: 'CRT', resumo: 'Criacao de tabelas e insercao de registros com foco em boas praticas SQL.' },
            { arquivo: 'aula-21.html', titulo: 'Aula 21', tema: 'CRUD R', icone: 'SEL', resumo: 'Leitura de dados com SELECT para alimentar a interface dinamicamente.' },
            { arquivo: 'aula-22.html', titulo: 'Aula 22', tema: 'CRUD U', icone: 'UPD', resumo: 'Atualizacao de registros com UPDATE e clausula WHERE com seguranca.' },
            { arquivo: 'aula-23.html', titulo: 'Aula 23', tema: 'CRUD D', icone: 'DEL', resumo: 'Exclusao de dados com DELETE e sincronizacao visual no DOM.' },
            { arquivo: 'aula-24.html', titulo: 'Aula 24', tema: 'POO Base', icone: 'CLS', resumo: 'Fundamentos de orientacao a objetos com classes, instancias e encapsulamento.' },
            { arquivo: 'aula-25.html', titulo: 'Aula 25', tema: 'POO Plus', icone: 'JEDI', resumo: 'POO avancada com atributos privados, parametros e metodos reutilizaveis.' },
            { arquivo: 'aula-26.html', titulo: 'Aula 26', tema: 'Modulos', icone: 'MOD', resumo: 'Separacao por camadas usando import e export para reduzir acoplamento.' },
            { arquivo: 'aula-27.html', titulo: 'Aula 27', tema: 'Dominio', icone: 'RULE', resumo: 'Modelagem de regras de negocio em classes de dominio independentes da UI.' },
            { arquivo: 'aula-28.html', titulo: 'Aula 28', tema: 'Repository', icone: 'DAL', resumo: 'Aplicacao do padrao Repository para isolar acesso a dados e SQL.' },
            { arquivo: 'aula-29.html', titulo: 'Aula 29', tema: 'Rotas', icone: 'MVC', resumo: 'Organizacao de servidor Express com separacao entre rotas e controllers.' },
            { arquivo: 'aula-30.html', titulo: 'Aula 30', tema: 'Componentes', icone: 'UIX', resumo: 'Componentizacao do front-end em blocos reutilizaveis com arquitetura limpa.' }
        ];

        function criarCard(aula) {
            const card = document.createElement('a');
            card.className = 'aula-card';
            card.href = aula.arquivo;
            card.dataset.label = 'Disponivel';
            card.innerHTML = `
                <span class="aula-chip">${aula.tema}</span>
                <div class="aula-icon">${aula.icone}</div>
                <div class="aula-number">${aula.titulo}</div>
                <div class="aula-summary">${aula.resumo}</div>
                <div class="aula-status">Abrir pratica</div>
            `;
            return card;
        }

        const grid = document.getElementById('gridContainer');
        aulas.forEach((aula) => grid.appendChild(criarCard(aula)));
    </script>
</body>
</html>
